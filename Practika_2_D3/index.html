<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <title> Трансформация и анимация</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="http://d3js.org/d3.v7.min.js"> </script>
    <script src="JavaScript/main.js"></script>
    <script src="JavaScript/image.js"></script>
    <script src="JavaScript/path.js"></script>
  </head>
  <body>   
    
    <form id="setting">
      <div class="setting__inputs">
        <div class="duration__input">
          <p>Время анимации (мс):<br>
            <label for="duration"></label>
            <input type="number" id="duration" value="5000" min="1000" max="20000" step="500">
          </p>
        </div>
        <div class="scale__fields">
          <p>Масштаб<br>
            <label for="mx">по x: </label>
            <input type="number" id="mx" value="1">
            <span class="finish__fields">
              <label for="mx_finish">до </label>
              <input type="number" id="mx_finish" value="1.5">
            </span><br>
            <label for="my">по y: </label>
            <input type="number" id="my" value="1">
            <span class="finish__fields">
              <label for="my_finish">до </label>
              <input type="number" id="my_finish" value="1.5">
            </span><br>
          </p>   
        </div>
        <div class="rotate__fields">
          <p>Поворот<br>
            <label for="angle">угол: </label>
            <input type="number" id="angle" value="0">
            <span class="finish__fields">
              <label for="angle_finish">до </label>
              <input type="number" id="angle_finish" value="180">
            </span>
          </p>
        </div>  
      </div>
      
      <div class="setting__buttons">
        <p>
          <input type="button" id="animateBtn" value="Анимировать">
        </p>
        <p>
          <input type="button" value="Очистить">
        </p>
      </div>
      
    </form>

    <svg></svg>

  </body>
</html>
