<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Достопримечательности России</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JavaScript/data.js" defer></script>
    <script src="JavaScript/main.js" defer></script>
    <script src="JavaScript/table.js" defer></script>
    <script src="JavaScript/filter.js" defer></script>
    <script src="JavaScript/sort.js" defer></script>
</head>
<body>
    <div class="forms__container">
      <form id="filter">
        <p>
          <label for="structure">Название:</label>
          <input type="text" id="structure">
        </p>
        <p>
          <label for="category">Тематика:</label>
          <input type="text" id="category">
        </p>
        <p>
          <label for="city">Место нахождения:</label>
          <input type="text" id="city">
        </p>
        <p>
          <label for="yearFrom">Год открытия: </label>
          от <input type="number" id="yearFrom"> 
          до <input type="number" id="yearTo">
        </p>
        <p>
          <label for="heightFrom">Посещаемость в год:</label>
          от <input type="number" id="heightFrom"> 
          до <input type="number" id="heightTo">
        </p>
        <input type="button" value="Найти">
        <input type="button" value="Очистить фильтры"> 
      </form>  
    
      <form id="sort">
        <p> Сортировать по</p>
        <p>
        <select id="fieldsFirst">
        </select>
        по убыванию? <input type="checkbox" id="fieldsFirstDesc">
        </p>
        <p>
        <select id="fieldsSecond">
        </select>
        по убыванию? <input type="checkbox" id="fieldsSecondDesc">
        </p>
        <p>
        <select id="fieldsThird">
        </select>
        по убыванию? <input type="checkbox" id="fieldsThirdDesc">
        </p>
        <input type="button" value="Сортировать">
        <input type="button" value="Сбросить сортировку">
      </form>
    </div>
    <table id="list">
    </table>
</body>
</html>
