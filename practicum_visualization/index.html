<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="CSS/style.css">
  <script src="http://d3js.org/d3.v7.min.js"> </script>
  <script src="JavaScript/data.js"></script>
  <script src="JavaScript/main.js"></script>
  <script src="JavaScript/table.js"></script>
  <script src="JavaScript/chart.js"></script>
</head>
<body>   
  <h3>Список самых высоких зданий</h3>

  <form id="setting">
    <div class="OX__values">Значение по оси OX<br>
        <div class="values__checkbox">
        <input type="radio" name="oxInput" value="0" id="countryInput">
        <label for="countryInput"> Страна</label>
        </div>
        <div class="values__checkbox">
        <input type="radio" name="oxInput" value="1" id="yearInput">
        <label for="yearInput"> Год</label>
        </div>
        
    </div>
    <div class="OY__values">Значение по оси OY<br>
        <div class="values__checkbox">
        <input type="checkbox" value="0" id="maxHeight">
        <label for="maxHeight"> Максимальная высота</label>
        </div>
        <div class="values__checkbox">
        <input type="checkbox" value="1" id="minHeight">
        <label for="minHeight"> Минимальная высота</label>
        </div>
    </div>
    <div class="diagram__values">
        <label for="diagramType">Тип графика</label>
        <select id="diagramType">
            <option value="0">Точечная диаграмма</option>
            <option value="1">Гистограмма</option>
        </select>
    </div>
    <input type="button" value="Построить" id="makeGraficButton">
    <div id="checkboxError">Выберите значение по оси OY!</div>
    <svg></svg>
    <input type="button" value="Скрыть таблицу" id="tableButton">
  </form>
  <table id="build"> 
  </table>
</body>
</html>
